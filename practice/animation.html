<!DOCTYPE html>
<html>
	<head>
		<title>Animation</title>
	</head>
	<body>
		<canvas id="myCanvas" width=800 height=800></canvas>
		<script>
			const canvas = document.getElementById("myCanvas");
			const ctx = canvas.getContext("2d")
			let x = 1;
			let x2 = 1;
			let speed = 5;
			let speed2 = 6;
			let time = 0;
		function animate(){
			time = time + 1;
		
			if(time<160){
				//move red
			x = x + speed;
			}
			if (time>160){
				//move green
			x2 = x2 + speed2;
			}
			ctx.clearRect(0,0,800,800);
			ctx.fillStyle="red";
			ctx.fillRect(x,100,10,10);
			ctx.fillStyle="green";
			ctx.fillRect(x2,300,10,10);
			requestAnimationFrame(animate); //input = function
		}
		animate();
		</script>
	</body>
</html>
